<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add User</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
    <style>
        body {
            background: linear-gradient(to right, #e0f7fa, #fce4ec);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            max-width: 500px;
            margin: 50px auto;
            padding: 25px;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
        }

        h3 {
            color: #1565c0;
            font-weight: 600;
            margin-bottom: 20px;
        }

        label {
            font-weight: 500;
        }

        .form-control {
            border-radius: 8px;
            font-size: 14px;
        }

        .form-row .form-group {
            margin-bottom: 15px;
        }

        .btn-success {
            background-color: #43a047;
            border: none;
            border-radius: 20px;
            padding: 6px 20px;
        }

        .btn-success:hover {
            background-color: #2e7d32;
        }

        .btn-secondary {
            border-radius: 20px;
            padding: 6px 20px;
        }

        .form-check-inline {
            margin-right: 15px;
        }

        select.form-control {
            height: 38px;
        }
    </style>
</head>
<body>
<div class="container">
    <h3 class="text-center">Add New User</h3>
    <form th:action="@{/admin/saveUser}" th:object="${user}" method="post">
        <div class="form-row">
            <div class="form-group col-md-6">
                <label>Username</label>
                <input type="text" th:field="*{username}" class="form-control" required>
            </div>
            <div class="form-group col-md-6">
                <label>Name</label>
                <input type="text" th:field="*{name}" class="form-control" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group col-md-6">
                <label>Email</label>
                <input type="email" th:field="*{email}" class="form-control" required>
            </div>
            <div class="form-group col-md-6">
                <label>Phone</label>
                <input type="text" th:field="*{phone}" class="form-control" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group col-md-6">
                <label>Password</label>
                <input type="password" th:field="*{pswrd}" class="form-control" required>
            </div>
            <div class="form-group col-md-6">
                <label>Confirm Password</label>
                <input type="password" th:field="*{cpswrd}" class="form-control" required>
            </div>
        </div>

        <div class="form-group">
            <label>Gender</label><br>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" th:field="*{gender}" value="Male" id="genderMale">
                <label class="form-check-label" for="genderMale">Male</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" th:field="*{gender}" value="Female" id="genderFemale">
                <label class="form-check-label" for="genderFemale">Female</label>
            </div>
        </div>

        <div class="form-group">
            <label>Role</label>
            <select th:field="*{role}" class="form-control">
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <div class="text-center mt-3">
            <button type="submit" class="btn btn-success">Add User</button>
            <a th:href="@{/admin/dashboard}" class="btn btn-secondary ml-2">Cancel</a>
        </div>
    </form>
</div>
</body>
</html>
