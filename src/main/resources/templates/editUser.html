<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
          crossorigin="anonymous">

    <style>
        body {
            background: linear-gradient(to right, #e0f7fa, #fce4ec);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .edit-container {
            max-width: 550px;
            margin: 50px auto;
            padding: 25px;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #1565c0;
            font-weight: 600;
            text-align: center;
            margin-bottom: 25px;
        }

        label {
            font-weight: 500;
        }

        .form-control {
            border-radius: 8px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .btn-primary {
            background-color: #1e88e5;
            border: none;
            border-radius: 20px;
            padding: 6px 20px;
        }

        .btn-primary:hover {
            background-color: #1565c0;
        }

        .btn-secondary {
            border-radius: 20px;
            padding: 6px 20px;
        }

        .form-check-inline {
            margin-right: 15px;
        }

        select.form-control {
            height: 38px;
        }
    </style>
</head>
<body>

<div class="edit-container">
    <h2>Edit User</h2>

    <form th:action="@{/admin/updateUser}" th:object="${user}" method="post">
        <div class="form-row">
            <div class="form-group col-md-6">
                <label>Username</label>
                <input th:field="*{username}" type="text" class="form-control" readonly>
            </div>
            <div class="form-group col-md-6">
                <label>Name</label>
                <input th:field="*{name}" type="text" class="form-control" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group col-md-6">
                <label>Email</label>
                <input th:field="*{email}" type="email" class="form-control" required>
            </div>
            <div class="form-group col-md-6">
                <label>Phone</label>
                <input th:field="*{phone}" type="text" class="form-control" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group col-md-6">
                <label>Role</label>
                <select th:field="*{role}" class="form-control" required>
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <div class="form-group col-md-6">
                <label>Gender</label><br>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" th:field="*{gender}" value="Male" id="genderMale">
                    <label class="form-check-label" for="genderMale">Male</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" th:field="*{gender}" value="Female" id="genderFemale">
                    <label class="form-check-label" for="genderFemale">Female</label>
                </div>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group col-md-6">
                <label>Password</label>
                <input th:field="*{pswrd}" type="password" class="form-control" readonly>
            </div>
            <div class="form-group col-md-6">
                <label>Confirm Password</label>
                <input th:field="*{cpswrd}" type="password" class="form-control" readonly>
            </div>
        </div>

        <div class="text-center mt-3">
            <button type="submit" class="btn btn-primary">Update User</button>
            <a th:href="@{/admin/dashboard}" class="btn btn-secondary ml-2">Cancel</a>
        </div>
    </form>
</div>

<!-- Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>

</body>
</html>
