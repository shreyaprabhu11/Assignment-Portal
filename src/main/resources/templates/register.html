<!doctype html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" crossorigin="anonymous">

    <style>
        body {
            background: linear-gradient(to right, #e0f7fa, #fce4ec);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .register-container {
            background-color: #ffffff;
            max-width: 450px;
            margin: 30px auto;
            padding: 20px 25px;
            border-radius: 12px;
            box-shadow: 0 5px 14px rgba(0, 0, 0, 0.08);
        }

        .register-header {
            text-align: center;
            color: #1565c0;
            font-weight: 600;
            font-size: 20px;
            margin-bottom: 20px;
        }

        label {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 3px;
        }

        .form-control {
            border-radius: 8px;
            font-size: 14px;
            height: 34px;
            padding: 6px 10px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .btn-success {
            background-color: #43a047;
            border: none;
            border-radius: 20px;
            padding: 7px 0;
            font-size: 15px;
        }

        .btn-success:hover {
            background-color: #2e7d32;
        }

        .form-check-inline {
            margin-right: 12px;
            font-size: 14px;
        }

        .text-center a {
            font-size: 13px;
            color: #1565c0;
        }

        .alert-danger {
            font-size: 13px;
            padding: 6px 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="register-container">
    <h3 class="register-header">User Registration</h3>

    <div th:if="${param.msg} == 'success'">
        <script>
            alert("Registration successful. Please login.");
        </script>
    </div>

    <form th:action="@{registerUser}" th:object="${user}" method="post">

        <div class="form-group">
            <label>Name</label>
            <input type="text" th:field="*{name}" class="form-control" placeholder="Name" required>
        </div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" th:field="*{username}" class="form-control" placeholder="Username" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" th:field="*{email}" class="form-control" placeholder="Email" required>
        </div>

        <div class="form-group">
            <label>Contact Number</label>
            <input type="text" th:field="*{phone}" class="form-control" placeholder="Contact Number" required>
        </div>

        <div class="form-row">
            <div class="form-group col-md-6">
                <label>Password</label>
                <input type="password" th:field="*{pswrd}" class="form-control" placeholder="Password" required>
            </div>
            <div class="form-group col-md-6">
                <label>Confirm Password</label>
                <input type="password" th:field="*{cpswrd}" class="form-control" placeholder="Confirm" required>
            </div>
        </div>

        <div class="form-group">
            <label>Gender</label><br>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" th:field="*{gender}" value="Male" id="genderMale">
                <label class="form-check-label" for="genderMale">Male</label>
            </div>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" th:field="*{gender}" value="Female" id="genderFemale">
                <label class="form-check-label" for="genderFemale">Female</label>
            </div>
        </div>

        <button type="submit" class="btn btn-success btn-block mt-2">Register</button>

        <div class="text-center mt-2">
            <a th:href="@{/}" style="text-decoration: none;">Already have an account? Please login</a>
        </div>

        <div th:if="${error}" class="alert alert-danger text-center mt-3" role="alert">
            <span th:text="${error}"></span>
        </div>
    </form>
</div>

<!-- Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>

</body>
</html>
